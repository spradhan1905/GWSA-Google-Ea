name: Build and deploy Python app to Azure Web App - GWSA-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BACKEND_PATH: GWSA-Google-Earth-main/geo-analytics/backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create virtual environment and install backend dependencies
        working-directory: ${{ env.BACKEND_PATH }}
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Upload backend artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            ${{ env.BACKEND_PATH }}
            !${{ env.BACKEND_PATH }}/antenv/
            !${{ env.BACKEND_PATH }}/.env
            !${{ env.BACKEND_PATH }}/__pycache__/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: GWSA-backend
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_D50135B1A9624BB689360A38B03E1D93 }}
          package: .
